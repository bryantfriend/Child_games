<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌴 ICT Adventure Island</title>
  <meta name="description" content="A fun and educational touch-based web app game where students explore ICT parts.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-container">
    <div id="confettiLayer"></div>
    <div id="feedbackBanner" class="feedback-banner"></div>

    <!-- HUD / Scoreboard -->
    <div id="hud">
      <div class="score-pill">
        <span class="icon">⭐</span>
        <span id="starCount">0</span>
      </div>
      <div class="score-pill">
        <span class="icon">🏆</span>
        <span id="completedCount">0 / 4</span>
      </div>
    </div>
    
    <!-- Main Map Screen -->
    <div id="map-screen">
      <div class="header-banner">
        <h1>🌴 ICT Adventure Island</h1>
        <button id="menuHomeBtn" class="menu-home-button" type="button">📚 Choose Lesson</button>
      </div>
      
      <div class="islands-container">
        <!-- Build Island -->
        <button class="island-card" data-game="build">
          <div class="island-view">
            <span class="icon-big">🖥️</span>
            <div class="status-dot"></div>
          </div>
          <span class="label">Computer Island</span>
        </button>
        
        <!-- Input Island -->
        <button class="island-card" data-game="input">
          <div class="island-view">
            <span class="icon-big">🧠</span>
            <div class="status-dot"></div>
          </div>
          <span class="label">Input Island</span>
        </button>
        
        <!-- Output Island -->
        <button class="island-card" data-game="output">
          <div class="island-view">
            <span class="icon-big">📺</span>
            <div class="status-dot"></div>
          </div>
          <span class="label">Output Island</span>
        </button>
        
        <!-- Challenge Island -->
        <button class="island-card" data-game="challenge">
          <div class="island-view">
            <span class="icon-big">🎯</span>
            <div class="status-dot"></div>
          </div>
          <span class="label">Challenge Island</span>
        </button>

        <!-- Fun Zone (Locked until 100 stars) -->
        <button class="island-card locked-island" data-game="fun" id="funBtn">
          <div class="island-view">
            <span class="icon-big">🎉</span>
            <div class="lock-icon">🔒</div>
          </div>
          <span class="label">Fun Zone</span>
        </button>
      </div>

      <!-- Silly Decorations -->
      <div id="sillyStar" class="silly-friend star-friend">⭐</div>
      <div id="sillyFish" class="silly-friend fish-friend">🐠</div>
      
      <div class="footer-hint">
        Lesson 1 map: tap an island to play. Use Choose Lesson for Lesson 2 or Games.
      </div>
    </div>

    <!-- Mini-Game Area / Lesson Overlay -->
    <div id="game-overlay">
      <div id="gameArea" class="lesson-surface">
        <!-- JS injects here: panelTitle, panelSubtitle, game content -->
        <div class="lesson-header">
           <h2 id="panelTitle">Loading...</h2>
           <p id="panelSubtitle">Starting your adventure.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Modular Scripts -->
  <script src="js/core.js"></script>
  <script src="js/data.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/checkin.js"></script>
  
  <!-- Lessons -->
  <script src="js/lessons/build.js"></script>
  <script src="js/lessons/input.js"></script>
  <script src="js/lessons/output.js"></script>
  <script src="js/lessons/challenge.js"></script>
  <script src="js/lessons/onoff.js"></script>
  
  <!-- Fun Zone -->
  <script src="js/fun/hub.js"></script>
  <script src="js/fun/mouse-chase.js"></script>
  <script src="js/fun/keyboard-smash.js"></script>
  <script src="js/fun/fix-computer.js"></script>
  <script src="js/fun/screen-defender.js"></script>
  <script src="js/fun/power-up.js"></script>
  
  <script src="js/main.js"></script>
</body>
</html>
